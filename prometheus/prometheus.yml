global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'party-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['party-service:8081']

  - job_name: 'player-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['player-service:8082']

  - job_name: 'stats-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['stats-service:8083']
