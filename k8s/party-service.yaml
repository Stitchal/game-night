apiVersion: apps/v1
kind: Deployment
metadata:
  name: party-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: party-service
  template:
    metadata:
      labels:
        app: party-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: party-service
          image: party-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka
---
apiVersion: v1
kind: Service
metadata:
  name: party-service
spec:
  selector:
    app: party-service
  ports:
    - port: 8081
      targetPort: 8081